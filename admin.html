<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>
<h1>Painel Administrativo</h1>
<div class="container">
  <a href="registro.html" class="btn">Novo Registro</a>
  <a href="historico.html" class="btn">Ver Histórico</a>
  <button id="btnSair" class="btn-danger">Sair</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_QowpgX19PlVE1Cz0D0cpIJh7K0nUq0o",
  authDomain: "ccb-registro.firebaseapp.com",
  projectId: "ccb-registro",
  storageBucket: "ccb-registro.firebasestorage.app",
  messagingSenderId: "634223347098",
  appId: "1:634223347098:web:c5124dd418b601baa22623"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("btnSair").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "login.html";
});

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const snap = await getDoc(doc(db, "usuarios", user.uid));
  if (!snap.exists() || snap.data().admin !== true) {
    alert("Acesso restrito a administradores.");
    window.location.href = "index.html";
  }
});
</script>
</body>
</html>
