<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style2.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container" style="max-width:400px; margin:120px auto; text-align:center;">
    <h2>Acesso ao Sistema</h2>

    <input 
        type="email" 
        id="email" 
        placeholder="Digite seu email"
        style="width:100%; padding:10px;"
    >

    <br><br>

    <input 
        type="password" 
        id="senha" 
        placeholder="Digite sua senha"
        style="width:100%; padding:10px;"
    >

    <br><br>

    <button id="btnLogin" style="width:100%;">
        Entrar
    </button>
    <br><br>
<a href="register.html">Criar conta</a>

    <p id="erro" style="color:red; margin-top:10px;"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_QowpgX19PlVE1Cz0D0cpIJh7K0nUq0o",
  authDomain: "ccb-registro.firebaseapp.com",
  projectId: "ccb-registro",
  storageBucket: "ccb-registro.firebasestorage.app",
  messagingSenderId: "634223347098",
  appId: "1:634223347098:web:c5124dd418b601baa22623",
  measurementId: "G-5F7P9SDRBB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* =========================
   SE JÁ ESTIVER LOGADO
========================= */

onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "dashboard.html";
    }
});

/* =========================
   LOGIN
========================= */

document.getElementById("btnLogin").addEventListener("click", async () => {

    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value.trim();
    const erro = document.getElementById("erro");

    erro.innerText = "";

    if (!email || !senha) {
        erro.innerText = "Preencha todos os campos.";
        return;
    }

    try {
        await signInWithEmailAndPassword(auth, email, senha);
        window.location.href = "dashboard.html";
    } catch (error) {
        erro.innerText = "Email ou senha inválidos.";
    }
});

/* ENTER PARA LOGAR */

document.getElementById("senha").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        document.getElementById("btnLogin").click();
    }
});

</script>

</body>
</html>
