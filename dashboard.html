<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style2.css">

    <!-- ATIVA DARK MODE ANTES DE CARREGAR -->
    <script>
        if (localStorage.getItem("darkMode") === "true") {
            document.documentElement.classList.add("dark");
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header class="topo">
    <div class="topo-container">
        <div class="logo-area" onclick="window.location.href='index.html'" style="cursor:pointer;">
            <img src="Logo_oficial_CCB.png" alt="Logo CCB">
            <span>CCB Itaquiti</span>
            <button id="btnMusica">MUSICA</button>
        </div>

        <h1>Controle de Presença da RDJ</h1>

        <nav class="menu">
            <button id="darkBtn" onclick="toggleDark()">TEMA</button>
            <a href="index.html">Home</a>
            <a href="registro.html" id="linkRegistrar">Registrar</a>
            <a href="historico.html">Histórico</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="sair()">Sair</button>
        </nav>
    </div>
</header>

<div class="container">

    <h2>Evolução de Presença</h2>

    <div class="stats">
        <div class="card-stat">
            <h3>Total de Reuniões</h3>
            <p id="totalReunioes">0</p>
        </div>

        <div class="card-stat">
            <h3>Média de Presença</h3>
            <p id="mediaPresenca">0</p>
        </div>

        <div class="card-stat">
            <h3>Maior Reunião</h3>
            <p id="maiorReuniao">0</p>
        </div>
    </div>

    <div style="margin-bottom:20px;">
        <button onclick="gerarPDFSemana()">PDF da Semana</button>
        <button onclick="gerarPDFMes()">PDF do Mês</button>
    </div>

    <canvas id="grafico"></canvas>

    <h2 style="margin-top:40px;">Irmãos x Visitas</h2>
    <canvas id="grafico2"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getFirestore, 
    collection, 
    query, 
    orderBy, 
    onSnapshot,
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { 
    getAuth, 
    onAuthStateChanged, 
    signOut 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyD_QowpgX19PlVE1Cz0D0cpIJh7K0nUq0o",
  authDomain: "ccb-registro.firebaseapp.com",
  projectId: "ccb-registro",
  storageBucket: "ccb-registro.firebasestorage.app",
  messagingSenderId: "634223347098",
  appId: "1:634223347098:web:c5124dd418b601baa22623"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* PROTECAO + VERIFICA ADMIN */
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    // Verifica se é admin
    const userRef = doc(db, "usuarios", user.uid);
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists() || userSnap.data().admin !== true) {
        const linkRegistrar = document.getElementById("linkRegistrar");
        if (linkRegistrar) linkRegistrar.style.display = "none";
    }

    carregarDados(); // Só carrega depois de autenticar
});

/* LOGOUT */
window.sair = async function () {
    await signOut(auth);
    window.location.href = "login.html";
};

/* DADOS */
let registros = [];
let grafico1 = null;
let grafico2 = null;

function carregarDados() {

    const q = query(collection(db, "registros"), orderBy("data"));

    onSnapshot(q, (snapshot) => {

        registros = [];

        snapshot.forEach(doc => {
            registros.push(doc.data());
        });

        carregarDashboard();
    });
}

function carregarDashboard() {

    let datas = [];
    let totais = [];
    let totaisIrmaos = [];
    let totaisVisitas = [];

    registros.forEach(r => {

        const mocos = Number(r.mocos) || 0;
        const mocas = Number(r.mocas) || 0;
        const casados = Number(r.casados) || 0;
        const visitas = Number(r.visitas) || 0;

        const total = mocos + mocas + casados + visitas;

        datas.push(r.data);
        totais.push(total);
        totaisIrmaos.push(mocos + mocas + casados);
        totaisVisitas.push(visitas);
    });

    let somaTotal = totais.reduce((acc, val) => acc + val, 0);
    let maior = Math.max(...totais, 0);
    let media = totais.length ? (somaTotal / totais.length).toFixed(1) : 0;

    document.getElementById("totalReunioes").innerText = registros.length;
    document.getElementById("mediaPresenca").innerText = media;
    document.getElementById("maiorReuniao").innerText = maior;

    if (grafico1) grafico1.destroy();
    if (grafico2) grafico2.destroy();

    grafico1 = new Chart(document.getElementById('grafico'), {
        type: 'line',
        data: {
            labels: datas,
            datasets: [{
                label: 'Total de Presença',
                data: totais,
                borderWidth: 3,
                tension: 0.3
            }]
        },
        options: { responsive: true }
    });

    grafico2 = new Chart(document.getElementById('grafico2'), {
        type: 'bar',
        data: {
            labels: datas,
            datasets: [
                { label: 'Irmãos', data: totaisIrmaos },
                { label: 'Visitas', data: totaisVisitas }
            ]
        },
        options: { responsive: true }
    });
}

/* PDF */
window.gerarPDFSemana = function () {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("Relatório Semanal - CCB Itaquiti", 20, 20);
    doc.save("Relatorio_Semanal.pdf");
};

window.gerarPDFMes = function () {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("Relatório Mensal - CCB Itaquiti", 20, 20);
    doc.save("Relatorio_Mensal.pdf");
};

</script>

<script src="js/global.js"></script>
<audio id="bgMusic" loop>
    <source src="musica.mp4" type="audio/mp4">
</audio>
</body>
</html>
