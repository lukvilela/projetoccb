<!DOCTYPE html>
<html>
<head>
    <title>Histórico</title>
    <link rel="stylesheet" href="style2.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="topo">
    <div class="topo-container">

        <div class="logo-area" onclick="window.location.href='index.html'" style="cursor:pointer;">
    <img src="Logo_oficial_CCB.png" alt="Logo CCB">
    <span>CCB Itaquiti</span>
    <button id="btnMusica">MUSICA</button>
        </div>

        <h1>Controle de Presença da RDJ</h1>

      <nav class="menu">
    <button id="darkBtn" onclick="toggleDark()">TEMA</button>
    <a href="index.html">Home</a>

    <span id="menuRegistro"></span>

    <a href="historico.html">Histórico</a>
    <a href="dashboard.html">Dashboard</a>

    <span id="menuLogin"></span>
</nav>

    </div>
</header>

<div class="container">
    <h2>Histórico</h2>
    <div id="lista"></div>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
  const firebaseConfig = {
     apiKey: "AIzaSyD_QowpgX19PlVE1Cz0D0cpIJh7K0nUq0o",
  authDomain: "ccb-registro.firebaseapp.com",
  projectId: "ccb-registro",
  storageBucket: "ccb-registro.firebasestorage.app",
  messagingSenderId: "634223347098",
  appId: "1:634223347098:web:c5124dd418b601baa22623",
  measurementId: "G-5F7P9SDRBB"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();
</script>

<script>

let isAdmin = false;
auth.onAuthStateChanged(async (user) => {

    const menuRegistro = document.getElementById("menuRegistro");
    const menuLogin = document.getElementById("menuLogin");
    const lista = document.getElementById("lista");

    if (!user) {
        isAdmin = false;
        menuRegistro.innerHTML = "";
        menuLogin.innerHTML = '<a href="login.html">Login</a>';
        lista.innerHTML = "<div class='card'>Faça login para ver o histórico.</div>";
        return;
    }

    menuLogin.innerHTML = '<button onclick="auth.signOut().then(()=>window.location.href=\'login.html\')">Sair</button>';

    // Verifica se é admin
    const userSnap = await db.collection("usuarios").doc(user.uid).get();

    isAdmin = false;

    if (userSnap.exists && userSnap.data().admin === true) {
        isAdmin = true;
        menuRegistro.innerHTML = '<a href="registro.html">Registrar</a>';
    } else {
        menuRegistro.innerHTML = "";
    }

    // LISTAR REGISTROS
    db.collection("registros")
    .orderBy("timestamp", "desc")
    .onSnapshot((snapshot) => {

        lista.innerHTML = "";

        if (snapshot.empty) {
            lista.innerHTML = `<div class="card">Nenhum registro encontrado.</div>`;
            return;
        }

        snapshot.forEach((doc) => {

            const r = doc.data();
            const id = doc.id;

            const mocos = Number(r.mocos) || 0;
            const mocas = Number(r.mocas) || 0;
            const casados = Number(r.casados) || 0;
            const musicos = Number(r.musicos) || 0;
            const organistas = Number(r.organistas) || 0;
            const visitas = Number(r.visitas) || 0;

            const totalIrmaos = mocos + mocas + casados;
            const totalGeral = totalIrmaos + visitas;

            lista.innerHTML += `
            <div class="card">
                <div class="card-header">
                    <div>
                        <span class="data">${r.data || "-"}</span>
                        <span class="palavra">${r.palavra || "Sem palavra"}</span>
                    </div>
                    <span class="atendeu">${r.atendeu || "-"}</span>
                </div>

                <div class="numeros">
                    <div>Moços <strong>${mocos}</strong></div>
                    <div>Moças <strong>${mocas}</strong></div>
                    <div>Casados <strong>${casados}</strong></div>
                    <div>Músicos <strong>${musicos}</strong></div>
                    <div>Organistas <strong>${organistas}</strong></div>
                    <div class="visita">Visitas <strong>${visitas}</strong></div>
                </div>

                <div class="total-box">
                    <div>Total Irmãos <strong>${totalIrmaos}</strong></div>
                    <div>Total Geral <strong>${totalGeral}</strong></div>
                </div>

                ${isAdmin ? `
                <div class="botoes">
                    <button onclick="editar('${id}')">Editar</button>
                    <button onclick="excluir('${id}')" class="excluir">Excluir</button>
                </div>
                ` : ""}

            </div>
            `;
        });

    });

});
/* =========================
   AÇÕES FIREBASE
========================= */

function excluir(id) {
    if (!isAdmin) {
        alert("Apenas administradores podem excluir registros.");
        return;
    }
    if (confirm("Deseja realmente excluir?")) {
        db.collection("registros").doc(id).delete()
        .then(() => {
            alert("Registro excluído com sucesso!");
        })
        .catch((error) => {
            console.error("Erro ao excluir:", error);
        });
    }
}

function editar(id) {
    if (!isAdmin) {
        alert("Apenas administradores podem editar registros.");
        return;
    }
    window.location.href = "registro.html?id=" + id;
}

</script>
<script src="js/global.js"></script>
<audio id="bgMusic" loop>
    <source src="musica.mp4" type="audio/mp4">
</audio>
</body>
</html>
